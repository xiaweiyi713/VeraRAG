name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run release gate
        run: |
          make release-check PYTHON=python

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.whl
            build/sbom/verarag-sbom.cdx.json
            build/release-health/release-artifacts-manifest.json
            build/release-checksums.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: verarag-release-artifacts
          if-no-files-found: error
          retention-days: 30
          path: |
            dist/*.tar.gz
            dist/*.whl
            build/sbom/verarag-sbom.cdx.json
            build/release-health/release-artifacts-manifest.json
            build/release-checksums.json

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: verarag-release-artifacts
          path: release-artifacts

      - name: Publish package distributions
        uses: pypa/gh-action-pypi-publish@7f25271a4aa483500f742f9492b2ab5648d61011 # v1.12.4
        with:
          packages-dir: release-artifacts/dist

  github-release:
    name: Create GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: verarag-release-artifacts
          path: release-artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release-artifacts/dist/* \
            release-artifacts/build/sbom/verarag-sbom.cdx.json \
            release-artifacts/build/release-health/release-artifacts-manifest.json \
            release-artifacts/build/release-checksums.json \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes "Release artifacts are generated by make release-check and include the wheel, sdist, SBOM, release-health manifest, and checksum manifest."
