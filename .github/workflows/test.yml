name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff mypy build wheel

      - name: Scan for committed secrets
        run: |
          python experiments/scan_secrets.py

      - name: Validate version identity
        run: |
          python experiments/validate_version_identity.py

      - name: Validate Python support metadata
        run: |
          python experiments/validate_python_support.py

      - name: Run environment doctor
        run: |
          python experiments/doctor.py

      - name: Validate default configs
        run: |
          python experiments/validate_configs.py

      - name: Generate secret scan SARIF
        if: ${{ always() && matrix.python-version == '3.13' }}
        run: |
          python experiments/scan_secrets.py --sarif > secret-scan.sarif || true

      - name: Validate documentation links
        run: |
          python experiments/validate_docs.py

      - name: Validate published results docs
        run: |
          python experiments/validate_results.py

      - name: Validate runnable examples
        run: |
          python experiments/validate_examples.py

      - name: Validate deployment config
        run: |
          python experiments/validate_deployment.py

      - name: Validate pre-commit config
        run: |
          python experiments/validate_precommit.py

      - name: Validate dependency metadata
        run: |
          python experiments/validate_dependency_metadata.py

      - name: Validate project metadata
        run: |
          python experiments/validate_project_metadata.py

      - name: Lint VeraBench quality path
        run: |
          python -m ruff check \
            verarag \
            src \
            web \
            experiments \
            examples \
            tests \
            configs \
            scripts \
            demo.py \
            demo_local.py \
            run_web.py

      - name: Type-check source packages
        # mypy targets python_version=3.10 via mypy.ini regardless of the
        # interpreter, so running it once is sufficient. Pinning to 3.11 also
        # avoids a false syntax error from numpy's 3.13 type stubs (PEP 695
        # `type` statements) being parsed under the 3.10 target.
        if: matrix.python-version == '3.11'
        run: |
          python -m mypy src verarag --config-file mypy.ini

      - name: Run tests
        run: |
          make coverage-check PYTHON=python

      - name: Validate VeraBench and demo metric plumbing
        run: |
          python experiments/validate_release_health.py \
            --output-dir /tmp/verarag-release-health

      - name: Build and validate package
        if: matrix.python-version == '3.13'
        run: |
          make package-check PYTHON=python

      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: |
            .coverage
            coverage.json

      - name: Upload secret scan SARIF
        if: ${{ always() && matrix.python-version == '3.13' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: secret-scan-sarif
          path: secret-scan.sarif
