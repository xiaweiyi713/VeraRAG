name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff mypy build wheel

      - name: Lint VeraBench quality path
        run: |
          python -m ruff check \
            verarag \
            src \
            web \
            experiments \
            examples \
            tests

      - name: Type-check source packages
        run: |
          python -m mypy src verarag --config-file mypy.ini

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=src --cov=verarag --cov-report=term-missing

      - name: Build package
        if: matrix.python-version == '3.13'
        run: |
          python -m build --sdist --wheel --no-isolation

      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
