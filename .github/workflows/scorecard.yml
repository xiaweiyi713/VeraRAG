name: Scorecard

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "19 4 * * 2"

# 顶层只读：publish_results 的 webapp 校验要求 global 权限不得为 write，
# 所有写权限必须下放到 job 级（见 ossf/scorecard-action#workflow-restrictions）。
permissions: read-all

jobs:
  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write  # OIDC token，供 publish_results 的 Sigstore keyless 签名
      contents: read

    steps:
      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.json
          results_format: json
          publish_results: true

      - name: Upload Scorecard artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scorecard-results
          path: scorecard-results.json
