name: Bug report
description: Report a reproducible bug in VeraRAG
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands, config, input question, and relevant output.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
      placeholder: git rev-parse --short HEAD
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, model provider, optional dependencies.
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      render: shell

