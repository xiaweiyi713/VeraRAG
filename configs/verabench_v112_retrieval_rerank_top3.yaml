# VeraBench v1.1.2 reranked retrieval-depth + adaptive-policy ablation config.
#
# This is not the canonical result identity. It mirrors the canonical DeepSeek
# full-run configuration except for retriever.type, retriever.retrieval_top_k,
# retriever.top_k_policy, and reranker settings, matching the current strongest
# offline retrieval matrix point: BM25+Reranker, depth 3, complexity-adaptive.
canonical_run:
  name: verabench_v112_retrieval_rerank_top3_deepseek
  benchmark_version: "1.1.2"
  benchmark_data_dir: data/verabench
  output: outputs/remote_results/verabench_v112_retrieval_rerank_top3_deepseek.json
  checkpoint: outputs/remote_results/verabench_v112_retrieval_rerank_top3_deepseek.json.ckpt.jsonl
  question_types: all
  question_ids: all
  max_questions: all
  bootstrap:
    method: stratified-question-bootstrap-v1
    dependency_method: evidence-cluster-bootstrap-v1
    confidence_level: 0.95
    resamples: 2000
    seed: 1729

llm:
  api_key: ${DEEPSEEK_API_KEY}
  max_tokens: 4000
  model: deepseek-v4-flash
  provider: deepseek
  temperature: 0.0

pipeline:
  enable_conflict_graph: true
  enable_repair: true
  enable_uncertainty: true
  enable_verification: true
  max_retrieval_rounds: 1

retriever:
  type: bm25_rerank
  retrieval_top_k: 3
  top_k_policy: complexity_adaptive
  adaptive_simple_top_k: 2
  adaptive_medium_top_k: 4
  adaptive_complex_top_k: 5
  reranker_model_name: BAAI/bge-reranker-base
  reranker_candidate_k: 5
  reranker_batch_size: 16
  reranker_local_files_only: false

evidence:
  semantic_dedup: true
  semantic_dedup_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  semantic_dedup_local_files_only: true

verification:
  nli_model: cross-encoder/nli-distilroberta-base
  nli_local_files_only: true
  nli_threshold: 0.7

conflict_graph:
  enable_learned_detector: false
  learned_model_path: ${VERARAG_CONFLICT_MODEL}
  learned_threshold: 0.7
  learned_require_context: true
  learned_candidate_similarity: 0.18
  enable_source_reliability_conflict: false
  enable_scope_conflict: false
  enable_granularity_conflict: false
  compare_within_evidence: false
  enable_nli: true
  nli_model: cross-encoder/nli-distilroberta-base
  nli_local_files_only: true
  nli_threshold: 0.7
  min_conflict_similarity: 0.22
  unattributed_conflict_similarity: 0.55
  enable_llm_adjudication: false
  llm_adjudication_similarity: 0.35
