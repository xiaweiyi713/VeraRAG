llm:
  api_key: ${DEEPSEEK_API_KEY}
  max_tokens: 500
  model: deepseek-v4-flash
  provider: deepseek
  temperature: 0.0
pipeline:
  enable_conflict_graph: true
  enable_repair: true
  enable_uncertainty: true
  enable_verification: true
  max_retrieval_rounds: 2

retriever:
  type: hybrid
  # fixed preserves the historical pipeline behavior. Use precision_cap or
  # complexity_adaptive for Stage-3 retrieval-precision ablations.
  top_k_policy: fixed

evidence:
  semantic_dedup: true
  semantic_dedup_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  semantic_dedup_local_files_only: false

verification:
  nli_model: cross-encoder/nli-distilroberta-base
  nli_local_files_only: false
  nli_threshold: 0.7

conflict_graph:
  enable_learned_detector: false
  learned_model_path: ${VERARAG_CONFLICT_MODEL}
  learned_threshold: 0.7
  learned_require_context: true
  learned_candidate_similarity: 0.18
  enable_source_reliability_conflict: false
  enable_scope_conflict: false
  enable_granularity_conflict: false
  compare_within_evidence: false
  enable_nli: true
  nli_model: cross-encoder/nli-distilroberta-base
  nli_local_files_only: false
  nli_threshold: 0.7
  min_conflict_similarity: 0.22
  unattributed_conflict_similarity: 0.55
  enable_llm_adjudication: false
  llm_adjudication_similarity: 0.35
