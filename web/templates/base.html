<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VeraRAG{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-card: rgba(0, 0, 0, 0.02);
            --border-color: rgba(0, 0, 0, 0.08);
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            --accent: #7c3aed;
            --accent-light: #a78bfa;
            --success: #059669;
            --success-light: #6ee7b7;
            --warning: #d97706;
            --danger: #dc2626;
            --select-bg: #f9fafb;
            --select-text: #111827;
        }
        .dark {
            --bg-primary: #0a0a0f;
            --bg-secondary: #0f0f1a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-primary: #e5e7eb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent: #a78bfa;
            --accent-light: #c4b5fd;
            --success: #6ee7b7;
            --success-light: #6ee7b7;
            --warning: #fbbf24;
            --danger: #f87171;
            --select-bg: #1a1a2e;
            --select-text: #e5e7eb;
        }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); }
        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
        }
        .gradient-text {
            background: linear-gradient(135deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stage-pending { color: var(--text-muted); }
        .stage-active { color: var(--accent); }
        .stage-done { color: var(--success); }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse { animation: pulse 1.5s infinite; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); margin-bottom: -1px; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        select option { background: var(--select-bg); color: var(--select-text); }
        #network-banner { position: fixed; top: 0; left: 0; right: 0; padding: 8px; text-align: center; font-size: 13px; z-index: 100; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="dark min-h-screen">
    <!-- Network Banner -->
    <div id="network-banner" class="hidden bg-red-500/90 text-white">网络连接已断开，请检查网络</div>

    <!-- Nav -->
    <nav class="border-b" style="border-color: var(--border-color)">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <span class="text-lg font-semibold gradient-text">VeraRAG</span>
                <span class="text-xs hidden sm:inline" style="color: var(--text-muted)">Verifiable Agentic RAG</span>
            </a>
            <div class="flex items-center gap-2 sm:gap-4">
                <button id="theme-toggle" class="text-sm transition px-2 py-1.5 rounded-lg hover:opacity-70" style="color: var(--text-secondary)" title="切换主题">
                    <span id="theme-icon">🌙</span>
                </button>
                <span id="llm-status" class="text-xs flex items-center gap-1.5 hidden sm:flex" style="color: var(--text-muted)">
                    <span class="w-1.5 h-1.5 rounded-full bg-gray-600 inline-block"></span>
                    检测中...
                </span>
                <button id="settings-btn" class="text-sm transition px-3 py-1.5 rounded-lg hover:opacity-70" style="color: var(--text-secondary)">
                    <span class="hidden sm:inline">设置</span><span class="sm:hidden">⚙️</span>
                </button>
                <a href="/history" class="text-sm transition px-3 py-1.5 rounded-lg hover:opacity-70" style="color: var(--text-secondary)">
                    <span class="hidden sm:inline">历史记录</span><span class="sm:hidden">📋</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <main class="max-w-5xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Status check -->
    <script>
    // Theme toggle
    (function() {
        const html = document.documentElement;
        const icon = document.getElementById('theme-icon');
        const saved = localStorage.getItem('verarag-theme');
        if (saved === 'light') {
            html.classList.remove('dark');
            if (icon) icon.textContent = '☀️';
        } else {
            html.classList.add('dark');
            if (icon) icon.textContent = '🌙';
        }
        document.getElementById('theme-toggle')?.addEventListener('click', () => {
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('verarag-theme', isDark ? 'dark' : 'light');
            if (icon) icon.textContent = isDark ? '🌙' : '☀️';
        });
    })();

    // Network status
    const networkBanner = document.getElementById('network-banner');
    window.addEventListener('offline', () => networkBanner?.classList.remove('hidden'));
    window.addEventListener('online', () => networkBanner?.classList.add('hidden'));
    </script>

    <script>
        // LLM providers config
        const PROVIDERS = {
            openai: { label: 'OpenAI', models: ['gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo', 'gpt-3.5-turbo'], keyEnv: 'OPENAI_API_KEY' },
            anthropic: { label: 'Anthropic Claude', models: ['claude-sonnet-4-20250514', 'claude-haiku-4-5-20251001', 'claude-opus-4-7'], keyEnv: 'ANTHROPIC_API_KEY' },
            deepseek: { label: 'DeepSeek', models: ['deepseek-chat', 'deepseek-reasoner'], keyEnv: 'DEEPSEEK_API_KEY' },
            dashscope: { label: '通义千问', models: ['qwen-turbo', 'qwen-plus', 'qwen-max'], keyEnv: 'DASHSCOPE_API_KEY' },
            zhipuai: { label: '智谱 GLM', models: ['glm-4-flash', 'glm-4-plus', 'glm-4'], keyEnv: 'ZHIPUAI_API_KEY' },
            ollama: { label: 'Ollama (本地)', models: ['qwen2.5:7b', 'llama3.1:8b', 'mistral:7b', 'gemma2:9b'], keyEnv: '' }
        };

        function loadStatus() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    const el = document.getElementById('llm-status');
                    if (data.llm_configured) {
                        const p = PROVIDERS[data.llm_provider] || { label: data.llm_provider };
                        el.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-emerald-400 inline-block"></span> ${p.label}`;
                        el.className = 'text-xs text-emerald-400/80 flex items-center gap-1.5';
                    } else {
                        el.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-amber-400 inline-block"></span> 演示模式';
                        el.className = 'text-xs text-amber-400/80 flex items-center gap-1.5';
                    }
                })
                .catch(() => {
                    const el = document.getElementById('llm-status');
                    el.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-red-400 inline-block"></span> 离线';
                    el.className = 'text-xs text-red-400/80 flex items-center gap-1.5';
                });
        }
        loadStatus();
    </script>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 z-50 hidden" role="dialog" aria-modal="true" aria-label="LLM 配置">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" id="settings-overlay"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md">
            <div class="glass rounded-2xl p-6 mx-4">
                <div class="flex items-center justify-between mb-5">
                    <h2 class="text-base font-medium" style="color: var(--text-primary)">LLM 配置</h2>
                    <button id="settings-close" class="text-lg px-2 transition hover:opacity-70" style="color: var(--text-muted)">&times;</button>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs mb-1.5" style="color: var(--text-secondary)">提供商</label>
                        <select id="cfg-provider" class="w-full rounded-lg px-3 py-2.5 text-sm outline-none transition" style="background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary)">
                            <option value="">-- 选择提供商 --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs mb-1.5" style="color: var(--text-secondary)">模型</label>
                        <select id="cfg-model" class="w-full rounded-lg px-3 py-2.5 text-sm outline-none transition" style="background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary)">
                            <option value="">-- 先选择提供商 --</option>
                        </select>
                    </div>
                    <div id="cfg-apikey-wrap">
                        <label class="block text-xs mb-1.5" style="color: var(--text-secondary)">API Key</label>
                        <input id="cfg-apikey" type="password" placeholder="sk-..." class="w-full rounded-lg px-3 py-2.5 text-sm outline-none transition" style="background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary)">
                    </div>
                    <div id="cfg-baseurl-wrap" class="hidden">
                        <label class="block text-xs mb-1.5" style="color: var(--text-secondary)">Base URL <span style="color: var(--text-muted)">(可选)</span></label>
                        <input id="cfg-baseurl" type="text" placeholder="http://localhost:11434" class="w-full rounded-lg px-3 py-2.5 text-sm outline-none transition" style="background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary)">
                    </div>
                </div>

                <div class="flex gap-3 mt-6">
                    <button id="settings-save" class="flex-1 px-5 py-2.5 bg-gradient-to-r from-violet-600 to-emerald-600 hover:from-violet-500 hover:to-emerald-500 text-white rounded-xl font-medium text-sm transition">
                        保存配置
                    </button>
                    <button id="settings-clear" class="px-5 py-2.5 bg-white/[0.04] hover:bg-white/[0.08] text-gray-400 rounded-xl text-sm transition border border-white/10">
                        清除
                    </button>
                </div>

                <p id="settings-msg" class="text-xs text-center mt-3 hidden"></p>
            </div>
        </div>
    </div>

    <script>
    (function() {
        const modal = document.getElementById('settings-modal');
        const providerSelect = document.getElementById('cfg-provider');
        const modelSelect = document.getElementById('cfg-model');
        const apikeyWrap = document.getElementById('cfg-apikey-wrap');
        const baseurlWrap = document.getElementById('cfg-baseurl-wrap');
        const msgEl = document.getElementById('settings-msg');

        // Populate providers
        Object.entries(PROVIDERS).forEach(([key, p]) => {
            const opt = document.createElement('option');
            opt.value = key;
            opt.textContent = p.label;
            providerSelect.appendChild(opt);
        });

        // Open/close
        document.getElementById('settings-btn').addEventListener('click', () => {
            modal.classList.remove('hidden');
            loadConfig();
        });
        document.getElementById('settings-close').addEventListener('click', () => modal.classList.add('hidden'));
        document.getElementById('settings-overlay').addEventListener('click', () => modal.classList.add('hidden'));
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !modal.classList.contains('hidden')) modal.classList.add('hidden'); });

        // Provider change -> update models
        providerSelect.addEventListener('change', () => {
            const p = PROVIDERS[providerSelect.value];
            modelSelect.innerHTML = '';
            if (p) {
                p.models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = m;
                    modelSelect.appendChild(opt);
                });
                // Ollama doesn't need API key
                apikeyWrap.classList.toggle('hidden', providerSelect.value === 'ollama');
                baseurlWrap.classList.toggle('hidden', providerSelect.value !== 'ollama');
            } else {
                modelSelect.innerHTML = '<option value="">-- 先选择提供商 --</option>';
                apikeyWrap.classList.remove('hidden');
                baseurlWrap.classList.add('hidden');
            }
        });

        function showMsg(text, color) {
            msgEl.textContent = text;
            msgEl.className = `text-xs text-center mt-3 text-${color}-400`;
            msgEl.classList.remove('hidden');
            setTimeout(() => msgEl.classList.add('hidden'), 3000);
        }

        // Load current config
        function loadConfig() {
            fetch('/api/config').then(r => r.json()).then(cfg => {
                if (cfg.provider) {
                    providerSelect.value = cfg.provider;
                    providerSelect.dispatchEvent(new Event('change'));
                    setTimeout(() => { modelSelect.value = cfg.model || ''; }, 50);
                }
            });
        }

        // Save
        document.getElementById('settings-save').addEventListener('click', () => {
            const provider = providerSelect.value;
            if (!provider) { showMsg('请选择提供商', 'amber'); return; }
            const model = modelSelect.value;
            const api_key = document.getElementById('cfg-apikey').value;
            const base_url = document.getElementById('cfg-baseurl').value;

            fetch('/api/config', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ provider, model, api_key, base_url })
            }).then(r => r.json()).then(() => {
                showMsg('配置已保存', 'emerald');
                loadStatus();
                setTimeout(() => modal.classList.add('hidden'), 800);
            }).catch(() => showMsg('保存失败', 'red'));
        });

        // Clear
        document.getElementById('settings-clear').addEventListener('click', () => {
            fetch('/api/config', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ provider: '', model: '', api_key: '', base_url: '' })
            }).then(r => r.json()).then(() => {
                providerSelect.value = '';
                providerSelect.dispatchEvent(new Event('change'));
                document.getElementById('cfg-apikey').value = '';
                showMsg('配置已清除', 'emerald');
                loadStatus();
            });
        });
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
