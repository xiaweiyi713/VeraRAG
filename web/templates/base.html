<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VeraRAG{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .gradient-text {
            background: linear-gradient(135deg, #a78bfa, #6ee7b7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stage-pending { color: #6b7280; }
        .stage-active { color: #a78bfa; }
        .stage-done { color: #6ee7b7; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse { animation: pulse 1.5s infinite; }
        .tab-btn.active { color: #a78bfa; border-bottom: 2px solid #a78bfa; margin-bottom: -1px; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-[#0a0a0f] text-gray-200 min-h-screen">
    <!-- Nav -->
    <nav class="border-b border-white/5">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <span class="text-lg font-semibold gradient-text">VeraRAG</span>
                <span class="text-xs text-gray-500 hidden sm:inline">Verifiable Agentic RAG</span>
            </a>
            <div class="flex items-center gap-4">
                <span id="llm-status" class="text-xs text-gray-500 flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-gray-600 inline-block"></span>
                    检测中...
                </span>
                <a href="/history" class="text-sm text-gray-400 hover:text-gray-200 transition px-3 py-1.5 rounded-lg hover:bg-white/5">
                    历史记录
                </a>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <main class="max-w-5xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Status check -->
    <script>
        fetch('/api/status')
            .then(r => r.json())
            .then(data => {
                const el = document.getElementById('llm-status');
                if (data.status === 'running') {
                    el.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-emerald-400 inline-block"></span> 就绪';
                    el.className = 'text-xs text-emerald-400/80 flex items-center gap-1.5';
                }
            })
            .catch(() => {
                const el = document.getElementById('llm-status');
                el.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-red-400 inline-block"></span> 离线';
                el.className = 'text-xs text-red-400/80 flex items-center gap-1.5';
            });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
