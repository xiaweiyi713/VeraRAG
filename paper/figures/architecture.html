<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeraRAG Architecture Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; }
  svg { max-width: 900px; }
  .stage-box { rx: 8; fill: rgba(139,92,246,0.08); stroke: rgba(139,92,246,0.3); stroke-width: 1.5; }
  .stage-label { fill: #c4b5fd; font-size: 13px; font-weight: 600; }
  .stage-desc { fill: #6b7280; font-size: 10px; }
  .arrow { stroke: rgba(255,255,255,0.15); stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
  .feedback { stroke: rgba(52,211,153,0.3); stroke-width: 1; fill: none; stroke-dasharray: 4 3; }
  .loop-label { fill: rgba(52,211,153,0.6); font-size: 9px; }
  .title { fill: #e5e7eb; font-size: 18px; font-weight: 700; }
  .subtitle { fill: #6b7280; font-size: 11px; }
  .badge { rx: 4; }
  .badge-text { fill: #fff; font-size: 8px; font-weight: 600; }
  .highlight { rx: 8; fill: rgba(52,211,153,0.08); stroke: rgba(52,211,153,0.3); stroke-width: 1.5; }
  .highlight-label { fill: #6ee7b7; font-size: 13px; font-weight: 600; }
</style>
</head>
<body>
<svg viewBox="0 0 860 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="rgba(255,255,255,0.25)"/>
    </marker>
    <marker id="arrowgreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="rgba(52,211,153,0.4)"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" class="title">VeraRAG Pipeline Architecture</text>
  <text x="430" y="48" text-anchor="middle" class="subtitle">Verifiable Agentic Retrieval-Augmented Reasoning</text>

  <!-- Input -->
  <rect x="30" y="65" width="120" height="36" rx="6" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1.5"/>
  <text x="90" y="87" text-anchor="middle" fill="#818cf8" font-size="12" font-weight="600">Question</text>
  <line x1="150" y1="83" x2="180" y2="83" class="arrow"/>

  <!-- Stage 1: Task Analysis -->
  <rect x="180" y="65" width="150" height="36" class="stage-box"/>
  <text x="255" y="82" text-anchor="middle" class="stage-label">Task Analyzer</text>
  <text x="255" y="95" text-anchor="middle" class="stage-desc">type · complexity · hops</text>
  <line x1="330" y1="83" x2="360" y2="83" class="arrow"/>

  <!-- Stage 2: Decomposition -->
  <rect x="360" y="65" width="150" height="36" class="stage-box"/>
  <text x="435" y="82" text-anchor="middle" class="stage-label">Planner</text>
  <text x="435" y="95" text-anchor="middle" class="stage-desc">sub-questions · dependencies</text>
  <line x1="510" y1="83" x2="540" y2="83" class="arrow"/>

  <!-- Stage 3: Dynamic Retrieval (loop) -->
  <rect x="540" y="55" width="170" height="56" rx="10" fill="rgba(251,191,36,0.06)" stroke="rgba(251,191,36,0.25)" stroke-width="1.5"/>
  <text x="625" y="78" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">Dynamic Retrieval</text>
  <text x="625" y="92" text-anchor="middle" class="stage-desc">BM25 + Dense + Reranking</text>
  <text x="625" y="104" text-anchor="middle" class="stage-desc">multi-round · counter-evidence</text>

  <!-- Retrieval loop arrow -->
  <path d="M710 83 Q740 83 740 110 Q740 130 625 130 Q540 130 540 111" class="feedback" marker-end="url(#arrowgreen)"/>
  <text x="640" y="138" text-anchor="middle" class="loop-label">uncertainty-gated loop (max 5 rounds)</text>

  <!-- Arrow down from retrieval -->
  <line x1="625" y1="111" x2="625" y2="160" class="arrow"/>

  <!-- Stage 4: Evidence Processing -->
  <rect x="400" y="160" width="170" height="36" class="stage-box"/>
  <text x="485" y="177" text-anchor="middle" class="stage-label">Evidence Normalizer</text>
  <text x="485" y="190" text-anchor="middle" class="stage-desc">dedup · credibility · recency</text>

  <!-- Stage 5: Conflict Graph (highlighted) -->
  <rect x="590" y="160" width="170" height="36" class="highlight"/>
  <text x="675" y="177" text-anchor="middle" class="highlight-label">Conflict Graph</text>
  <text x="675" y="190" text-anchor="middle" class="stage-desc">8-type detection · severity</text>

  <!-- Arrow from evidence to conflict -->
  <line x1="570" y1="178" x2="590" y2="178" class="arrow"/>

  <!-- Arrow down from evidence -->
  <line x1="485" y1="196" x2="485" y2="220" class="arrow"/>

  <!-- Stage 6: Uncertainty (highlighted) -->
  <rect x="400" y="220" width="170" height="36" class="highlight"/>
  <text x="485" y="237" text-anchor="middle" class="highlight-label">Uncertainty Controller</text>
  <text x="485" y="250" text-anchor="middle" class="stage-desc">5-dim estimation · calibration</text>

  <!-- Feedback: uncertainty → retrieval -->
  <path d="M400 238 Q350 238 350 200 Q350 100 360 83" class="feedback" marker-end="url(#arrowgreen)"/>
  <text x="320" y="165" text-anchor="middle" class="loop-label" transform="rotate(-90, 320, 165)">continue retrieval?</text>

  <!-- Arrow down -->
  <line x1="485" y1="256" x2="485" y2="290" class="arrow"/>

  <!-- Stage 7: Reasoning -->
  <rect x="400" y="290" width="170" height="36" class="stage-box"/>
  <text x="485" y="307" text-anchor="middle" class="stage-label">Reasoning Agent</text>
  <text x="485" y="320" text-anchor="middle" class="stage-desc">claims · evidence citation</text>

  <!-- Arrow down -->
  <line x1="485" y1="326" x2="485" y2="360" class="arrow"/>

  <!-- Stage 8: Verification (highlighted) -->
  <rect x="400" y="360" width="170" height="36" class="highlight"/>
  <text x="485" y="377" text-anchor="middle" class="highlight-label">Verifier Agent</text>
  <text x="485" y="390" text-anchor="middle" class="stage-desc">NLI + LLM · claim verification</text>

  <!-- Arrow down -->
  <line x1="485" y1="396" x2="485" y2="430" class="arrow"/>

  <!-- Stage 9: Repair (highlighted) -->
  <rect x="400" y="430" width="170" height="36" class="highlight"/>
  <text x="485" y="447" text-anchor="middle" class="highlight-label">Repair Agent</text>
  <text x="485" y="460" text-anchor="middle" class="stage-desc">hedging · downgrade · fix</text>

  <!-- Feedback: repair → reasoning -->
  <path d="M400 448 Q370 448 370 390 Q370 340 380 308" class="feedback" marker-end="url(#arrowgreen)"/>
  <text x="355" y="390" text-anchor="middle" class="loop-label" transform="rotate(-90, 355, 390)">regenerate</text>

  <!-- Arrow down to output -->
  <line x1="485" y1="466" x2="485" y2="500" class="arrow"/>

  <!-- Output -->
  <rect x="365" y="500" width="240" height="50" rx="8" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.4)" stroke-width="1.5"/>
  <text x="485" y="520" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="600">Verified Answer</text>
  <text x="485" y="538" text-anchor="middle" fill="#6b7280" font-size="10">claims · confidence · uncertainty · evidence</text>

  <!-- Knowledge Base -->
  <rect x="30" y="160" width="130" height="40" rx="6" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="95" y="177" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="600">VeraBench Corpus</text>
  <text x="95" y="192" text-anchor="middle" class="stage-desc">33 docs · 6 themes</text>
  <line x1="160" y1="180" x2="180" y2="100" class="arrow" style="stroke:rgba(99,102,241,0.2)"/>
  <text x="170" y="135" text-anchor="middle" class="stage-desc" fill="rgba(99,102,241,0.4)">index</text>

  <!-- Legend -->
  <rect x="30" y="580" width="800" height="80" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="50" y="605" fill="#9ca3af" font-size="11" font-weight="600">Legend</text>

  <rect x="50" y="620" width="24" height="12" class="stage-box"/>
  <text x="82" y="630" fill="#9ca3af" font-size="10">Standard stage</text>

  <rect x="200" y="620" width="24" height="12" class="highlight"/>
  <text x="232" y="630" fill="#9ca3af" font-size="10">VeraRAG unique contribution</text>

  <line x1="420" y1="626" x2="450" y2="626" class="arrow"/>
  <text x="460" y="630" fill="#9ca3af" font-size="10">Data flow</text>

  <line x1="560" y1="626" x2="590" y2="626" class="feedback" marker-end="url(#arrowgreen)"/>
  <text x="600" y="630" fill="#9ca3af" font-size="10">Feedback / loop</text>
</svg>
</body>
</html>
